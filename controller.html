<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scoreboard Controller</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; min-height: 100vh;
      background: #0d0d0d;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    header {
      background: #1a1a2e;
      border-bottom: 2px solid #2a2a5a;
      padding: 14px 20px;
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.1em;
      color: #7eb3ff;
      text-transform: uppercase;
    }
    header small { display: block; font-size: 11px; color: #555; font-weight: 400; margin-top: 2px; letter-spacing: 0.05em; }

    .sync-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 6px;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0.3; } }

    .container { padding: 16px; max-width: 500px; margin: 0 auto; }

    /* Score section */
    .scores-row {
      display: grid;
      grid-template-columns: 1fr 60px 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
    }
    .score-card {
      background: #1a1a2e;
      border: 2px solid #2a2a5a;
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
    }
    .score-card.right { background: #2e1a1a; border-color: #5a2a2a; }

    .score-card-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: #666; margin-bottom: 6px;
    }
    .score-display {
      font-size: 64px; font-weight: 900;
      line-height: 1; color: #5b9bd5;
    }
    .score-card.right .score-display { color: #e05c5c; }

    .score-btns { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
    .score-btns button {
      flex: 1;
      padding: 10px 0;
      font-size: 20px; font-weight: 900;
      border: none; border-radius: 8px;
      cursor: pointer; transition: transform 0.1s, opacity 0.1s;
    }
    .score-btns button:active { transform: scale(0.93); opacity: 0.8; }
    .btn-up   { background: #22c55e; color: #000; }
    .btn-down { background: #444; color: #fff; }

    .vs-badge {
      text-align: center;
      font-size: 20px; font-weight: 900;
      color: #444;
    }

    /* Players */
    .section-title {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: #555; margin: 18px 0 8px 0;
    }
    .players-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 4px;
    }
    .player-input-wrap { display: flex; flex-direction: column; gap: 4px; }
    .player-label {
      font-size: 10px; color: #555;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .player-input {
      background: #1a1a2e; border: 1px solid #2a2a5a;
      border-radius: 8px; color: white;
      padding: 10px 12px; font-size: 14px;
      font-weight: 700; width: 100%; outline: none;
      text-transform: uppercase;
    }
    .player-input.right-team { background: #2e1a1a; border-color: #5a2a2a; }
    .player-input:focus { border-color: #5b9bd5; }

    /* Info fields */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .info-input {
      background: #1a1a1a; border: 1px solid #333;
      border-radius: 8px; color: white;
      padding: 10px 12px; font-size: 14px;
      width: 100%; outline: none;
    }
    .info-input:focus { border-color: #5b9bd5; }

    /* Swap button */
    .swap-btn {
      width: 100%; margin-top: 16px;
      padding: 14px;
      background: #1a1a2e; border: 2px solid #2a2a5a;
      border-radius: 10px; color: #7eb3ff;
      font-size: 15px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: background 0.2s;
    }
    .swap-btn:hover { background: #2a2a4e; }

    /* Reset scores */
    .reset-btn {
      width: 100%; margin-top: 10px;
      padding: 12px;
      background: #1a0000; border: 2px solid #5a0000;
      border-radius: 10px; color: #ff6b6b;
      font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .reset-btn:hover { background: #2a0000; }

    .spacer { height: 40px; }
  </style>
</head>
<body>

  <header>
    <span class="sync-dot"></span>Court 1 Controller
    <small>Changes update the LED board instantly</small>
  </header>

  <div class="container">

    <!-- SCORES -->
    <div class="section-title">Score</div>
    <div class="scores-row">
      <div class="score-card">
        <div class="score-card-label">Left Team</div>
        <div class="score-display" id="disp1">0</div>
        <div class="score-btns">
          <button class="btn-up"   onclick="adjust('score1',1)">+</button>
          <button class="btn-down" onclick="adjust('score1',-1)">−</button>
        </div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="score-card right">
        <div class="score-card-label">Right Team</div>
        <div class="score-display" id="disp2">0</div>
        <div class="score-btns">
          <button class="btn-up"   onclick="adjust('score2',1)">+</button>
          <button class="btn-down" onclick="adjust('score2',-1)">−</button>
        </div>
      </div>
    </div>

    <!-- PLAYERS LEFT -->
    <div class="section-title">Left Team Players</div>
    <div class="players-grid">
      <div class="player-input-wrap">
        <div class="player-label">Player 4 (top)</div>
        <input id="p4" class="player-input" value="PLAYER 4" maxlength="20">
      </div>
      <div class="player-input-wrap">
        <div class="player-label">Player 3 (bottom)</div>
        <input id="p3" class="player-input" value="PLAYER 3" maxlength="20">
      </div>
    </div>

    <!-- PLAYERS RIGHT -->
    <div class="section-title">Right Team Players</div>
    <div class="players-grid">
      <div class="player-input-wrap">
        <div class="player-label">Player 1 (top)</div>
        <input id="p1" class="player-input right-team" value="PLAYER 1" maxlength="20">
      </div>
      <div class="player-input-wrap">
        <div class="player-label">Player 2 (bottom)</div>
        <input id="p2" class="player-input right-team" value="PLAYER 2" maxlength="20">
      </div>
    </div>

    <!-- EVENT INFO -->
    <div class="section-title">Event Info</div>
    <div class="info-grid">
      <input id="event" class="info-input" value="TOURNAMENT" placeholder="Event name">
      <input id="games" class="info-input" value="0-0, 0-0"   placeholder="Games e.g. 11-8, 0-0">
    </div>

    <!-- ACTIONS -->
    <button class="swap-btn" onclick="swapSides()">⇄ Swap Sides</button>
    <button class="reset-btn" onclick="resetScores()">✕ Reset Scores to 0</button>

    <div class="spacer"></div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://pickleballscoreboard-a963e-default-rtdb.firebaseio.com",
    projectId: "pickleballscoreboard-a963e",
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const dbRef = ref(db, 'scoreboard');

  const ids = ['p1','p2','p3','p4','score1','score2','event','games'];

  // Sync incoming Firebase data to inputs & score displays
  onValue(dbRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) return;
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el && data[id] !== undefined && el.value !== String(data[id])) {
        el.value = String(data[id]);
      }
    });
    if (data.score1 !== undefined) document.getElementById('disp1').textContent = data.score1;
    if (data.score2 !== undefined) document.getElementById('disp2').textContent = data.score2;
  });

  function sync() {
    const data = {};
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el) data[id] = el.value;
    });
    set(dbRef, data);
    // Update local score displays immediately
    document.getElementById('disp1').textContent = data.score1;
    document.getElementById('disp2').textContent = data.score2;
  }

  // Attach sync to text inputs
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el && el.tagName === 'INPUT') el.oninput = sync;
  });

  window.adjust = (id, amt) => {
    const el = document.getElementById(id);
    el.value = Math.max(0, parseInt(el.value || '0') + amt);
    sync();
  };

  window.swapSides = () => {
    const get = id => document.getElementById(id).value;
    const set2 = (id, v) => { document.getElementById(id).value = v; };
    const [p1,p2,p3,p4,s1,s2] = [get('p1'),get('p2'),get('p3'),get('p4'),get('score1'),get('score2')];
    set2('p1',p4); set2('p4',p1);
    set2('p2',p3); set2('p3',p2);
    set2('score1',s2); set2('score2',s1);
    sync();
  };

  window.resetScores = () => {
    document.getElementById('score1').value = '0';
    document.getElementById('score2').value = '0';
    sync();
  };
</script>
</body>
</html>
