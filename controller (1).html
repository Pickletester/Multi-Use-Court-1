<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scoreboard Controller</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: black;
      font-family: sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 20px;
    }
    h2 { font-size: 14px; color: #888; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }

    .container { position: relative; width: 832px; height: 384px; display: flex; border: 1px solid #444; flex-shrink: 0; }
    .player-area { width: 245px; display: flex; flex-direction: column; }
    .player-box { height: 192px; border: 1px solid white; background: #1a365d; display: flex; align-items: center; justify-content: center; }
    .player-box input { background: none; border: none; color: white; font-weight: bold; font-size: 24px; text-align: center; width: 100%; outline: none; }
    .score-area { width: 110px; border: 1px solid white; background: #808080; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .score-area input { background: none; border: none; color: white; font-weight: bold; font-size: 85px; text-align: center; width: 100%; outline: none; }
    .controls button { background: #333; color: white; border: 1px solid white; cursor: pointer; padding: 5px 10px; margin: 2px; font-size: 16px; }
    .controls button:active { background: #555; }
    .info-panel { flex-grow: 1; padding: 20px; text-align: right; font-size: 13px; color: #ccc; }
    .info-panel input { background: none; border: none; color: white; font-weight: bold; font-size: 16px; text-align: right; width: 100%; outline: none; border-bottom: 1px solid #444; margin-bottom: 8px; }
    #clock { font-size: 18px; margin-top: 30px; color: white; }

    .actions { width: 832px; display: flex; gap: 10px; margin-top: 14px; }
    .actions button { flex: 1; padding: 14px; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; }
    .btn-swap  { background: #1a365d; border: 1px solid white; color: white; }
    .btn-swap:active { background: #2a4a7f; }
    .btn-reset { background: #3a0000; border: 1px solid #ff4444; color: #ff6666; }
    .btn-reset:active { background: #550000; }

    .status-bar { width: 832px; margin-top: 10px; padding: 8px 14px; background: #111; border: 1px solid #333; border-radius: 6px; font-size: 12px; color: #666; text-align: center; }
    .status-bar.connected { color: #22c55e; border-color: #22c55e; }
    .status-bar.error     { color: #ff4444; border-color: #ff4444; }
  </style>
</head>
<body>
  <h2>Court 1 Scoreboard Controller</h2>
  <div class="container">
    <div class="player-area">
      <div class="player-box"><input id="p4" value="PLAYER 4"></div>
      <div class="player-box"><input id="p3" value="PLAYER 3"></div>
    </div>
    <div class="score-area">
      <input id="score1" value="0" type="number" min="0">
      <div class="controls">
        <button onclick="window.adjust('score1', 1)">▲</button>
        <button onclick="window.adjust('score1', -1)">▼</button>
      </div>
    </div>
    <div class="score-area">
      <input id="score2" value="0" type="number" min="0">
      <div class="controls">
        <button onclick="window.adjust('score2', 1)">▲</button>
        <button onclick="window.adjust('score2', -1)">▼</button>
      </div>
    </div>
    <div class="player-area">
      <div class="player-box"><input id="p1" value="PLAYER 1"></div>
      <div class="player-box"><input id="p2" value="PLAYER 2"></div>
    </div>
    <div class="info-panel">
      EVENT NAME<br>
      <input id="event" value="TOURNAMENT"><br>
      GAMES<br>
      <input id="games" value="0-0, 0-0">
      <div id="clock">--:--:-- --</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-swap"  onclick="window.swapSides()">Swap Sides</button>
    <button class="btn-reset" onclick="window.resetScores()">Reset Scores to 0</button>
  </div>
  <div class="status-bar" id="statusBar">Connecting to Firebase...</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://pickleballscoreboard-a963e-default-rtdb.firebaseio.com",
    projectId: "pickleballscoreboard-a963e",
  };

  const statusEl = document.getElementById('statusBar');
  let dbRef;

  try {
    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);
    dbRef = ref(db, 'scoreboard');
    statusEl.textContent = 'Connected';
    statusEl.className   = 'status-bar connected';
  } catch(e) {
    statusEl.textContent = 'Firebase init failed: ' + e.message;
    statusEl.className   = 'status-bar error';
  }

  const ids = ['p1','p2','p3','p4','score1','score2','event','games'];

  onValue(dbRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) return;
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el && data[id] !== undefined) el.value = String(data[id]);
    });
    statusEl.textContent = 'Live - ' + new Date().toLocaleTimeString();
    statusEl.className   = 'status-bar connected';
  }, (err) => {
    statusEl.textContent = 'Error: ' + err.message;
    statusEl.className   = 'status-bar error';
  });

  function sync() {
    const data = {};
    ids.forEach(id => { const el = document.getElementById(id); if (el) data[id] = el.value; });
    set(dbRef, data).catch(err => {
      statusEl.textContent = 'Save failed: ' + err.message;
      statusEl.className   = 'status-bar error';
    });
  }

  ids.forEach(id => { const el = document.getElementById(id); if (el) el.oninput = sync; });

  window.adjust = (id, amt) => {
    const el = document.getElementById(id);
    el.value = Math.max(0, parseInt(el.value || '0') + amt);
    sync();
  };

  window.swapSides = () => {
    const g = id => document.getElementById(id).value;
    const s = (id, v) => { document.getElementById(id).value = v; };
    const [p1,p2,p3,p4,s1,s2] = [g('p1'),g('p2'),g('p3'),g('p4'),g('score1'),g('score2')];
    s('p1',p4); s('p4',p1); s('p2',p3); s('p3',p2); s('score1',s2); s('score2',s1);
    sync();
  };

  window.resetScores = () => {
    document.getElementById('score1').value = '0';
    document.getElementById('score2').value = '0';
    sync();
  };

  setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString();
  }, 1000);
</script>
</body>
</html>
