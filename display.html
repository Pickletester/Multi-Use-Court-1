<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Court 1 – Display</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #0a0a0a;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    /* ── MAIN SCOREBOARD ── */
    .board {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr 1fr;
      grid-template-columns: 1fr auto auto 1fr;
    }

    /* Team / player name cells */
    .team {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #1a365d;
      border: 2px solid #2a4a7f;
      gap: 12px;
      padding: 20px;
    }
    .team.right { background: #3d1a1a; border-color: #7f2a2a; }

    .player-name {
      font-size: clamp(22px, 3.5vw, 52px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      word-break: break-word;
    }

    /* Score cells — span both rows */
    .score-col {
      grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1c1c1c;
      border: 2px solid #333;
      min-width: 180px;
      padding: 0 24px;
      gap: 8px;
    }

    .score-num {
      font-size: clamp(80px, 16vw, 220px);
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .score-col.left  .score-num { color: #5b9bd5; }
    .score-col.right .score-num { color: #e05c5c; }

    .score-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #666;
    }

    /* Info strip at bottom */
    .info-strip {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 52px;
      background: rgba(0,0,0,0.75);
      border-top: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      font-size: 16px;
      color: #ccc;
      backdrop-filter: blur(6px);
    }
    .info-strip .event-name { font-weight: 700; color: #fff; letter-spacing: 0.05em; }
    .info-strip .games      { color: #aaa; }
    .info-strip .clock      { font-weight: 700; color: #fff; font-size: 18px; }

    /* Score change flash animation */
    @keyframes scoreFlash {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.18); color: #ffe066; }
      100% { transform: scale(1); }
    }
    .flash { animation: scoreFlash 0.5s ease; }
  </style>
</head>
<body>

  <!-- LEFT TEAM -->
  <div class="board">
    <div class="team" id="cell-p4"><div class="player-name" id="disp-p4">PLAYER 4</div></div>
    <div class="score-col left"  id="score-col-1">
      <div class="score-label">SCORE</div>
      <div class="score-num" id="disp-score1">0</div>
    </div>
    <div class="score-col right" id="score-col-2">
      <div class="score-label">SCORE</div>
      <div class="score-num" id="disp-score2">0</div>
    </div>
    <div class="team right" id="cell-p1"><div class="player-name" id="disp-p1">PLAYER 1</div></div>
    <div class="team"       id="cell-p3"><div class="player-name" id="disp-p3">PLAYER 3</div></div>
    <div class="team right" id="cell-p2"><div class="player-name" id="disp-p2">PLAYER 2</div></div>
  </div>

  <!-- INFO STRIP -->
  <div class="info-strip">
    <div class="event-name" id="disp-event">TOURNAMENT</div>
    <div class="games"      id="disp-games">0-0, 0-0</div>
    <div class="clock"      id="disp-clock">--:-- --</div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://pickleballscoreboard-a963e-default-rtdb.firebaseio.com",
    projectId: "pickleballscoreboard-a963e",
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const dbRef = ref(db, 'scoreboard');

  // Map Firebase keys → display element IDs
  const fieldMap = {
    p1: 'disp-p1', p2: 'disp-p2',
    p3: 'disp-p3', p4: 'disp-p4',
    score1: 'disp-score1', score2: 'disp-score2',
    event:  'disp-event',
    games:  'disp-games',
  };

  function flashEl(el) {
    el.classList.remove('flash');
    void el.offsetWidth; // reflow to restart animation
    el.classList.add('flash');
    el.addEventListener('animationend', () => el.classList.remove('flash'), { once: true });
  }

  onValue(dbRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) return;
    Object.entries(fieldMap).forEach(([key, dispId]) => {
      if (data[key] === undefined) return;
      const el = document.getElementById(dispId);
      if (!el) return;
      const newVal = String(data[key]);
      if (el.textContent !== newVal) {
        // Flash scores when they change
        if (key === 'score1' || key === 'score2') flashEl(el);
        el.textContent = newVal;
      }
    });
  });

  // Clock
  function tick() {
    document.getElementById('disp-clock').textContent =
      new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });
    setTimeout(tick, 1000);
  }
  tick();
</script>
</body>
</html>
