<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Court 1 – Display</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: transparent;
      font-family: sans-serif;
      color: white;
    }

    /* ═══ SCOREBOARD VIEW ═══ */
    #scoreboardView {
      display: none;
      width: 100vw; height: 100vh;
      background: black;
      align-items: center; justify-content: center;
    }
    #scoreboardView.active { display: flex; }

    .sb-container { position: relative; width: 832px; height: 384px; display: flex; border: 1px solid #444; }
    .player-area { width: 245px; display: flex; flex-direction: column; }
    .player-box { height: 192px; border: 1px solid white; background: #1a365d; display: flex; align-items: center; justify-content: center; }
    .player-name { font-size: 24px; font-weight: bold; text-align: center; color: white; padding: 8px; word-break: break-word; }
    .score-area { width: 110px; border: 1px solid white; background: #808080; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .score-num { font-size: 85px; font-weight: bold; color: white; text-align: center; line-height: 1; }
    .info-panel {
      flex-grow: 1;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 16px 12px;
      border-left: 1px solid #444;
      text-align: center;
    }
    .info-block { width: 100%; padding: 14px 0; border-bottom: 1px solid #222; }
    .info-block:last-child { border-bottom: none; }
    .info-label {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #5b9bd5;
      margin-bottom: 6px;
    }
    .info-value {
      font-weight: 900;
      color: white;
      font-size: 15px;
      line-height: 1.1;
      letter-spacing: 0.04em;
      word-break: break-word;
    }
    #disp-event {
      font-size: 17px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }
    #disp-games {
      font-size: 24px;
    }
    #disp-clock {
      font-size: 26px;
      font-weight: 900;
      color: white;
      letter-spacing: 0.04em;
    }

    @keyframes scoreFlash { 0%{ transform:scale(1); } 30%{ transform:scale(1.15); color:#ffe066; } 100%{ transform:scale(1); } }
    .flash { animation: scoreFlash 0.4s ease; }

    /* ═══ SCOREBUG VIEW — black background ═══ */
    #scorebugView {
      display: none;
      width: 100vw; height: 100vh;
      background: transparent;
    }
    #scorebugView.active { display: block; }

    .bar { position:fixed; left:0; right:0; bottom:0; height:72px; display:grid; grid-template-columns:1.2fr 2.2fr 1.1fr 2.1fr 1.2fr; gap:4px; padding:8px 12px; box-sizing:border-box; transition: background 400ms ease; background:linear-gradient(90deg,#14203a,#22335d 70%); }
    .bar.red  { background:linear-gradient(90deg,#4a0000,#c02020 70%); }
    .bar.skill{ background:linear-gradient(90deg,var(--skillA,#14203a),var(--skillB,#22335d) 70%); }
    .sec { position:relative; display:flex; flex-direction:column; justify-content:center; align-items:center; overflow:hidden; border-radius:6px; }
    .sec:not(#cn)::before { content:""; position:absolute; left:3px; right:3px; top:3px; bottom:3px; background:#000; opacity:.78; border-radius:6px; }
    .label { font-weight:700; text-transform:uppercase; font-size:10px; letter-spacing:.08em; z-index:1; margin-bottom:1px; color:#d4e5fd; }
    #cur .label { color:#6cff6c; }
    #nxt .label { color:#ffe56b; }
    .val { font-weight:800; z-index:1; text-align:center; line-height:1.08; color:#fff; padding:0 6px; }
    #cur .val, #nxt .val { font-size:14px; white-space:normal; overflow-wrap:anywhere; word-break:break-word; }
    #cd .val  { font-size:20px; }
    #now .val { font-size:16px; }
    #cn { transition: background 400ms ease; }
    #cn.alert::before { content:""; position:absolute; left:3px; right:3px; top:3px; bottom:3px; background:linear-gradient(180deg,#4a0000,#a80000); opacity:.65; border-radius:10px; }
    #cn .val { position:relative; font-size:58px; font-weight:900; padding:2px 12px; letter-spacing:.02em; border:3px solid #fff; border-radius:10px; text-shadow:0 1px 2px rgba(0,0,0,.4); transition: border-color 300ms ease; }
    .pulse-blue { animation: pulseBlue 2.8s ease-in-out infinite; }
    .pulse-blue::after { content:""; position:absolute; left:-5px; right:-5px; top:-5px; bottom:-5px; border-radius:14px; animation: glowBlue 2.8s ease-in-out infinite; pointer-events:none; }
    @keyframes pulseBlue { 0%,100%{ border-color:#ffffff; } 50%{ border-color:#7fbfff; } }
    @keyframes glowBlue  { 0%,100%{ box-shadow:0 0 6px rgba(0,128,255,0.25); } 50%{ box-shadow:0 0 14px rgba(0,128,255,0.45); } }
    .pulse-red { animation: pulseRed 2.2s ease-in-out infinite; }
    .pulse-red::after { content:""; position:absolute; left:-6px; right:-6px; top:-6px; bottom:-6px; border-radius:14px; animation: glowRed 2.2s ease-in-out infinite; pointer-events:none; }
    @keyframes pulseRed { 0%,100%{ border-color:#ffffff; } 50%{ border-color:#ff5a5a; } }
    @keyframes glowRed  { 0%,100%{ box-shadow:0 0 8px rgba(255,0,0,0.25); } 50%{ box-shadow:0 0 22px rgba(255,0,0,0.7); } }
    .nopulse { animation:none; }
    .nopulse::after { content:none; }
    .expired-msg { font-size:28px; color:#ff4444; font-weight:900; }
    .meta { font-size:12px; color:#d8d8d8; }
    #infoOverlay { position:fixed; top:0; left:0; right:0; bottom:0; z-index:9999; background:rgba(0,0,0,.82); display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 800ms ease; }
    #infoOverlay.active { opacity:1; pointer-events:auto; }
    .overlayBox { background-color:#0c0c0c; border-radius:30px; padding:45px 80px 55px 80px; max-width:80%; text-align:center; color:#fff; transform:scale(.82); box-shadow: 0 0 15px rgba(0,140,255,.55), 0 0 30px rgba(0,90,255,.45), 0 0 60px rgba(60,120,255,.35); }
    #infoOverlay.active .overlayBox { animation: popIn .9s cubic-bezier(.18,.89,.32,1) forwards, glowPulse 2.8s ease-in-out infinite; }
    .overlayLogo { display:block; margin:0 auto 12px auto; max-width:420px; max-height:120px; filter: drop-shadow(0 6px 8px rgba(0,0,0,0.65)) drop-shadow(0 0 10px rgba(0,0,0,0.45)); }
    .overlayLevel { font-size:56px; font-weight:900; margin:16px 0; letter-spacing:.12em; text-transform:uppercase; color:#000; }
    .overlayBody { font-size:30px; line-height:1.25; font-weight:700; margin-top:10px; }
    @keyframes popIn { 0%{ transform:scale(.7); opacity:0; } 80%{ transform:scale(1.05); } 100%{ transform:scale(1); opacity:1; } }
    @keyframes glowPulse { 0%,100%{ box-shadow:0 0 15px rgba(0,140,255,.55),0 0 30px rgba(0,90,255,.45),0 0 60px rgba(60,120,255,.35); } 50%{ box-shadow:0 0 30px rgba(0,180,255,.9), 0 0 60px rgba(0,120,255,.7), 0 0 90px rgba(80,180,255,.6); } }
    #errBadge { position:fixed; top:10px; left:10px; z-index:10000; background:rgba(140,0,0,.85); color:#fff; padding:8px 10px; border-radius:10px; font:700 14px Arial; display:none; max-width:calc(100vw - 20px); box-shadow:0 6px 16px rgba(0,0,0,.35); }
  </style>
</head>
<body>

  <div id="errBadge">API issue — backing off…</div>

  <!-- SCOREBOARD -->
  <div id="scoreboardView">
    <div class="sb-container">
      <div class="player-area">
        <div class="player-box"><div class="player-name" id="disp-p4">PLAYER 4</div></div>
        <div class="player-box"><div class="player-name" id="disp-p3">PLAYER 3</div></div>
      </div>
      <div class="score-area"><div class="score-num" id="disp-score1">0</div></div>
      <div class="score-area"><div class="score-num" id="disp-score2">0</div></div>
      <div class="player-area">
        <div class="player-box"><div class="player-name" id="disp-p1">PLAYER 1</div></div>
        <div class="player-box"><div class="player-name" id="disp-p2">PLAYER 2</div></div>
      </div>
      <div class="info-panel">
        <div class="info-block">
          <div class="info-label">Event</div>
          <div class="info-value" id="disp-event">TOURNAMENT</div>
        </div>
        <div class="info-block">
          <div class="info-label">Games</div>
          <div class="info-value" id="disp-games">0-0, 0-0</div>
        </div>
        <div class="info-block">
          <div class="info-label">Time</div>
          <div id="disp-clock">--:--</div>
        </div>
      </div>
    </div>
  </div>

  <!-- SCOREBUG -->
  <div id="scorebugView">
    <div class="bar" id="bar">
      <div id="cn"  class="sec"><div class="val pulse-blue" id="cno">1</div></div>
      <div id="cur" class="sec"><div class="label">In Progress</div><div class="val" id="curv">Loading...</div></div>
      <div id="cd"  class="sec"><div class="label" id="cdlbl">Time Left</div><div class="val" id="cdv">--</div></div>
      <div id="nxt" class="sec"><div class="label">Upcoming</div><div class="val" id="nxtv">Loading next...</div></div>
      <div id="now" class="sec"><div class="label">Current Time</div><div class="val" id="clock">--:--</div></div>
    </div>
    <div id="infoOverlay">
      <div class="overlayBox" id="overlayBox">
        <img src="levelup-logo.png" alt="LevelUp Pickleball" class="overlayLogo">
        <div class="overlayLevel" id="overlayLevel" style="display:none;"></div>
        <div class="overlayBody" id="overlayBody">Loading...</div>
      </div>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

  const app = initializeApp({
    databaseURL: "https://pickleballscoreboard-a963e-default-rtdb.firebaseio.com",
    projectId: "pickleballscoreboard-a963e",
  });
  const db = getDatabase(app);

  onValue(ref(db, 'view'), (snap) => {
    const v = snap.val() || 'scorebug';
    document.getElementById('scoreboardView').classList.toggle('active', v === 'scoreboard');
    document.getElementById('scorebugView').classList.toggle('active',   v === 'scorebug');
  });

  const fieldMap = { p1:'disp-p1', p2:'disp-p2', p3:'disp-p3', p4:'disp-p4', score1:'disp-score1', score2:'disp-score2', event:'disp-event', games:'disp-games' };

  function flash(el) { el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash'); el.addEventListener('animationend', () => el.classList.remove('flash'), { once: true }); }

  onValue(ref(db, 'scoreboard'), (snap) => {
    const data = snap.val(); if (!data) return;
    Object.entries(fieldMap).forEach(([key, id]) => {
      if (data[key] === undefined) return;
      const el = document.getElementById(id); if (!el) return;
      const v = String(data[key]);
      if (el.textContent !== v) { if (key === 'score1' || key === 'score2') flash(el); el.textContent = v; }
    });
  });

  function tick() {
    const el = document.getElementById('disp-clock');
    if (el) {
      const now = new Date();
      let h = now.getHours();
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      el.textContent = h + ':' + m + ':' + s + ' ' + ampm;
    }
    setTimeout(tick, 1000);
  }
  tick();
</script>

  function getLevelInfo(title){ var t=(title||""),tl=t.toLowerCase(),tn=tl.replace(/\s+/g,"").replace(/[–—]/g,"-"); var info={bubbleColor:null,label:"",overlayBg:"#0c0c0c"}; if(tn.indexOf("4.5+")>=0||tn.indexOf("4.5-")>=0||tn.indexOf("5.0")>=0){ info.bubbleColor="#cfd829"; info.label="4.5+"; info.overlayBg="#cfd829"; } else if(tn.indexOf("4.0-4.4")>=0||tn.indexOf("4.0-4.49")>=0||tn.indexOf("4.0-4.5")>=0||tn.indexOf("4.0-4")>=0){ info.bubbleColor="#f47855"; info.label="4.0–4.49"; info.overlayBg="#f47855"; } else if(tn.indexOf("3.5-3.9")>=0||tn.indexOf("3.5-3.99")>=0||tn.indexOf("3.5+")>=0){ info.bubbleColor="#ee3c85"; info.label="3.5–3.99"; info.overlayBg="#6d28d9"; } else if(tn.indexOf("3.0-3.4")>=0||tn.indexOf("3.0-3.49")>=0){ info.bubbleColor="#22c55e"; info.label="3.0–3.49"; info.overlayBg="#15803d"; } else if(tn.indexOf("2.0-2.9")>=0||tn.indexOf("2.0-2.99")>=0){ info.bubbleColor="#38bdf8"; info.label="2.0–2.99"; info.overlayBg="#0ea5e9"; } else if(tl.indexOf("advanced")>=0){ info.bubbleColor="#cfd829"; info.label="4.5+"; info.overlayBg="#cfd829"; } else if(tl.indexOf("intermediate+")>=0){ info.bubbleColor="#ee3c85"; info.label="3.5–3.99"; info.overlayBg="#6d28d9"; } else if(tl.indexOf("intermediate")>=0){ info.bubbleColor="#48b749"; info.label="3.0–3.49"; info.overlayBg="#15803d"; } else if(tl.indexOf("beginner")>=0){ info.bubbleColor="#38bdf8"; info.label="2.0–2.99"; info.overlayBg="#0ea5e9"; } return info; }
  function isCancelled(x){ if(!x||typeof x!=="object") return false; if(x.IsCanceled===true||x.IsCancelled===true||x.Cancelled===true) return true; if(x.IsActive===false||x.Active===false) return true; var s=""; if(typeof x.Status==="string") s+=" "+x.Status; if(typeof x.EventStatus==="string") s+=" "+x.EventStatus; if(typeof x.RegistrationStatus==="string") s+=" "+x.RegistrationStatus; return s.toLowerCase().indexOf("cancel")>=0; }
  function render(cur,nxt){ var curEl=document.getElementById("curv"),nxtEl=document.getElementById("nxtv"); if(cur){ lastCurName=cur.name+fmtTime(cur); var lv=getLevelInfo(cur.name||""); currentLevelLabel=lv.label; currentLevelBg=lv.overlayBg; currentIsSkill=!!lv.bubbleColor; curEl.className="val"; curEl.style.color="#ffffff"; curEl.innerHTML=cur.name+fmtTime(cur); setBarMode(currentIsSkill?"skill":"blue"); startCountdown(cur.end.getTime(),"cur"); } else { currentLevelLabel=""; currentLevelBg="#0c0c0c"; currentIsSkill=false; curEl.className="val"; curEl.style.color="#ffffff"; curEl.textContent="No current event"; setBarMode("blue"); if(nxt) startCountdown(nxt.start.getTime(),"next"); else startCountdown(null,"none"); } if(nxt) nxtEl.innerHTML=nxt.name+fmtTime(nxt); else nxtEl.textContent="No upcoming event"; }
  function normalizeEvent(x){ if(isCancelled(x)) return null; var nm=x.EventName||x.Name||x.Title||x.name||x.title||"Event"; var s=parseTimeAny(x.StartDateTime||x.StartTime||x.Start||x.startDateTime||x.start); var e=parseTimeAny(x.EndDateTime||x.EndTime||x.End||x.endDateTime||x.end); if(!s||!e) return null; return {kind:"event",name:nm,start:s,end:e,raw:x}; }
  function shortName(p){ var fn=(p.FirstName||p.firstName||"").trim(),ln=(p.LastName||p.lastName||"").trim(),i=fn?fn.charAt(0).toUpperCase()+".":""; return (i&&ln)?(i+" "+ln):(i||ln||""); }
  function normalizeResv(x){ var s=parseTimeAny(x.StartTime||x.StartDateTime||x.Start||x.startTime||x.start); var e=parseTimeAny(x.EndTime||x.EndDateTime||x.End||x.endTime||x.end); if(!s||!e) return null; var name=""; if(Array.isArray(x.Players)&&x.Players.length){ var arr=[]; for(var i=0;i<x.Players.length;i++) arr.push(shortName(x.Players[i]||{})); name=arr.join(", "); } if(!name&&x.ReservationTypeName) name=x.ReservationTypeName; if(!name) name="Reserved"; return {kind:"res",name:name,start:s,end:e,raw:x}; }
  function computeAndRender(){ var ev=[],rs=[],i; for(i=0;i<cacheEv.length;i++){ var a=normalizeEvent(cacheEv[i]); if(a) ev.push(a); } for(i=0;i<cacheRes.length;i++){ var b=normalizeResv(cacheRes[i]); if(b) rs.push(b); } var evC=[],rsC=[],evFallback=[]; for(i=0;i<ev.length;i++){ if(isExcludedByName(ev[i].name)) continue; var rc=ev[i].raw.Courts; if(Array.isArray(rc)&&rc.length===0){ evFallback.push(ev[i]); } else if(containsCourtN(ev[i].raw,COURT_NO)){ evC.push(ev[i]); } } for(i=0;i<rs.length;i++){ if(isExcludedByName(rs[i].name)) continue; if(containsCourtN(rs[i].raw,COURT_NO)) rsC.push(rs[i]); } var primary=rsC.concat(evC); primary.sort(function(a,b){ return a.start-b.start; }); evFallback.sort(function(a,b){ return a.start-b.start; }); var now=new Date(),cur=null,nxt=null,it,i2; for(i2=0;i2<primary.length;i2++){ it=primary[i2]; if(now>=it.start&&now<=it.end){ if(!cur){ cur=it; } else if(it.end>cur.end){ cur=it; } else if(it.end.getTime()===cur.end.getTime()&&it.kind==="res"&&cur.kind==="event"){ cur=it; } } if(!nxt&&now<it.start) nxt=it; } if(!cur){ for(i2=0;i2<evFallback.length;i2++){ it=evFallback[i2]; if(now>=it.start&&now<=it.end){ cur=it; break; } } } if(!nxt){ for(i2=0;i2<evFallback.length;i2++){ it=evFallback[i2]; if(now<it.start){ nxt=it; break; } } } nxtStart=nxt?nxt.start.getTime():null; if(cur||nxt) lastGood={cur:cur,nxt:nxt}; if(cur||nxt) render(cur,nxt); else if(lastGood) render(lastGood.cur,lastGood.nxt); else render(null,null); }
  function scheduleNext(){ if(refreshTimer) clearTimeout(refreshTimer); refreshTimer=setTimeout(function(){ refresh(false); },refreshDelayMs); }
  function refresh(){ var url=PROXY_BASE+"?court="+COURT_NO; xhrJSON(url,apiHeaders(),8000,function(err,data,status){ if(!err&&data){ showErrBadge(false); refreshDelayMs=BASE_REFRESH_MS; cacheEv=pickArray(data.events); cacheRes=pickArray(data.reservations); computeAndRender(); } else { var msg="API issue — backing off…"; if(status===429) msg="Rate limited — backing off…"; if(status===403) msg="Forbidden — check API key"; showErrBadge(true,msg); refreshDelayMs=Math.min(refreshDelayMs*2,MAX_BACKOFF_MS); try{ computeAndRender(); }catch(e){} } scheduleNext(); }); }
  var infoOverlay=document.getElementById("infoOverlay"),overlayBodyEl=document.getElementById("overlayBody"),overlayBoxEl=document.getElementById("overlayBox"),overlayLvlEl=document.getElementById("overlayLevel");
  function applyOverlayStyles(){ if(!overlayBoxEl||!overlayLvlEl) return; if(currentLevelLabel){ overlayLvlEl.style.display="block"; overlayLvlEl.textContent=currentLevelLabel; overlayBoxEl.style.backgroundColor=currentLevelBg||"#0c0c0c"; } else { overlayLvlEl.style.display="none"; overlayLvlEl.textContent=""; overlayBoxEl.style.backgroundColor="#0c0c0c"; } }
  function showOverlay(){ if(!infoOverlay) return; if(!document.getElementById("scorebugView").classList.contains("active")) return; var curEl=document.getElementById("curv"); if(curEl&&overlayBodyEl) overlayBodyEl.innerHTML=curEl.innerHTML||curEl.textContent||""; applyOverlayStyles(); infoOverlay.classList.add("active"); setTimeout(function(){ infoOverlay.classList.remove("active"); },10000); }
  function startOverlayLoop(){ if(!infoOverlay) return; var now=new Date(); var ms=(60-now.getSeconds())*1000-now.getMilliseconds(); if(ms<100) ms=100; setTimeout(function(){ showOverlay(); setInterval(showOverlay,60000); },ms); }
  document.getElementById("cno").textContent=String(COURT_NO);
  tickClock(); refresh(); scheduleNext(); startOverlayLoop();
})();
